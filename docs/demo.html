<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Data Workspace Demo</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%230064ff'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='Arial' font-size='16' fill='white'%3ED%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "i18next": "https://esm.sh/i18next@24.2.3",
          "react-i18next": "https://esm.sh/react-i18next@15.2.0?external=react",
          "zustand": "https://esm.sh/zustand@5.0.3?external=react",
          "lucide-react": "https://esm.sh/lucide-react@0.542.0?external=react",
          "xlsx": "https://esm.sh/xlsx@0.18.5",
          "@radix-ui/react-dialog": "https://esm.sh/@radix-ui/react-dialog@1.1.4?external=react,react-dom",
          "@radix-ui/react-select": "https://esm.sh/@radix-ui/react-select@2.2.5?external=react,react-dom",
          "@winm2m/react-stats-ui": "https://esm.sh/@winm2m/react-stats-ui?external=react,react/jsx-runtime,react-dom,i18next,react-i18next,@radix-ui/react-select,@radix-ui/react-dialog,lucide-react,xlsx",
          "@winm2m/react-data-workspace": "https://esm.sh/@winm2m/react-data-workspace?external=react,react/jsx-runtime,react-dom,i18next,react-i18next,zustand,@radix-ui/react-dialog,@radix-ui/react-select,@winm2m/react-stats-ui,lucide-react"
        }
      }
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      const params = new URLSearchParams(window.location.search);
      const useDevBuild = params.get("dev") === "true";
      window.__WINM2M_INFERENTIAL_WORKER_URL__ = "https://cdn.jsdelivr.net/npm/@winm2m/inferential-stats-js@1.5.0/dist/stats-worker.js";

      const localDistSpecifier = `/dist/index.js?v=${Date.now()}`;
      const cdnSpecifier = `https://cdn.jsdelivr.net/npm/@winm2m/react-data-workspace@latest/dist/index.js`;

      async function loadWorkspaceModule() {
        if (useDevBuild) {
          try {
            console.info("[demo] loading local dist build", localDistSpecifier);
            return await import(localDistSpecifier);
          } catch (error) {
            console.warn("[demo] failed to load local dist build", error);
          }
        }
        console.info("[demo] loading CDN build", cdnSpecifier);
        return import(`${cdnSpecifier}?module`);
      }

      const { DataWorkspace, createStatsWorkbenchPlugin } = await loadWorkspaceModule();

      const demoData = [
        { city: "Seoul", temperature: 23.4, humidity: 46, condition: "Sunny" },
        { city: "Busan", temperature: 21.1, humidity: 52, condition: "Cloudy" },
        { city: "Tokyo", temperature: 25.6, humidity: 44, condition: "Sunny" },
        { city: "Osaka", temperature: 24.2, humidity: 48, condition: "Cloudy" },
        { city: "New York", temperature: 19.5, humidity: 68, condition: "Rain" }
      ];

      function Control({ label, children }) {
        return React.createElement(
          "label",
          { className: "flex flex-col text-xs font-semibold uppercase tracking-wide text-slate-500" },
          label,
          children
        );
      }

      function DemoApp() {
        const [theme, setTheme] = React.useState("light");
        const [language, setLanguage] = React.useState("en");
        const [showDatasetPopover, setShowDatasetPopover] = React.useState(true);
        const plugins = React.useMemo(() => [createStatsWorkbenchPlugin()], []);

        return React.createElement(
          "div",
          {
            className: `flex h-full flex-col gap-4 bg-gradient-to-br ${theme === "dark" ? "from-slate-950 via-slate-900 to-slate-800" : "from-slate-100 via-white to-slate-50"} p-4`
          },
          React.createElement(
            "div",
            { className: "flex flex-wrap items-end gap-4 rounded-2xl border border-white/10 bg-white/70 p-4 shadow-lg backdrop-blur-lg dark:bg-white/5" },
            React.createElement(
              Control,
              { label: "Theme" },
              React.createElement(
                "select",
                {
                  value: theme,
                  onChange: (event) => setTheme(event.target.value),
                  className: "rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
                },
                React.createElement("option", { value: "light" }, "light"),
                React.createElement("option", { value: "dark" }, "dark")
              )
            ),
            React.createElement(
              Control,
              { label: "Language" },
              React.createElement(
                "select",
                {
                  value: language,
                  onChange: (event) => setLanguage(event.target.value),
                  className: "rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
                },
                ["en", "ko", "fr", "ru", "ja", "zh", "es", "vi"].map((code) => React.createElement("option", { key: code, value: code }, code))
              )
            ),
            React.createElement(
              Control,
              { label: "Dataset popover" },
              React.createElement(
                "select",
                {
                  value: showDatasetPopover ? "true" : "false",
                  onChange: (event) => setShowDatasetPopover(event.target.value === "true"),
                  className: "rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
                },
                React.createElement("option", { value: "true" }, "show"),
                React.createElement("option", { value: "false" }, "hide")
              )
            ),
            React.createElement(
              "div",
              { className: "text-xs text-slate-500" },
              "Use the dataset panel in the top right to upload additional ",
              React.createElement("code", null, ".xlsx"),
              " or ",
              React.createElement("code", null, ".json"),
              " files."
            )
          ),
          React.createElement(
            "div",
            { className: "flex-1 overflow-hidden rounded-[28px] border border-white/10 bg-white/90 shadow-2xl ring-1 ring-white/20 dark:bg-slate-900" },
            React.createElement(DataWorkspace, {
              initialData: demoData,
              plugins,
              showDatasetPopover,
              defaultTheme: theme,
              defaultLanguage: language
            })
          )
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(DemoApp));
    </script>
  </body>
</html>
